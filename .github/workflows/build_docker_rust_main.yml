name: Build Docker Image (Rust-main)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docker-compose.yml"
      - "docker-compose-warp.yml"
      - "docs/**"
      - ".github/workflows/build_docker_main.yml"
      - ".github/workflows/build_docker_dev.yml"
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Bump version if commit message contains 'release'
        id: bump_version
        if: contains(github.event.head_commit.message, 'release')
        run: |
          python -c '
          import re
          with open("version.txt", "r") as f:
              ver = f.read().strip()
          m = re.match(r"^(\d+\.\d+\.\d+)-(beta|alpha|rc)(\d+)$", ver)
          if m:
              base, pre, num = m.groups()
              new_ver = f"{base}-{pre}{int(num)+1}"
          else:
              m2 = re.match(r"^(\d+\.\d+)\.(\d+)$", ver)
              if m2:
                  prefix, patch = m2.groups()
                  new_ver = f"{prefix}.{int(patch)+1}"
              else:
                  new_ver = ver
          with open("version.txt", "w") as f:
              f.write(new_ver)
          print(f"Bumped version from {ver} to {new_ver}")
          '
          new_ver=$(cat version.txt)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.txt
          git commit -m "chore: bump version to $new_ver [skip ci]" || echo "No changes to commit"
          git push origin main || echo "No changes to push"

      - name: Read the version from version.txt
        id: get_version
        run: |
          version=$(cat version.txt)
          echo "Current version: v$version"
          echo "version=v$version" >> $GITHUB_OUTPUT

      - name: Commit and push version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=${{ steps.get_version.outputs.version }}
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -f "$version-rust"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "$version-rust"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set target images
        id: set_images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          IMAGES="ghcr.io/${{ github.repository }}-rust"
          if [ "$DOCKER_USERNAME" != "" ]; then
            IMAGES="${IMAGES}
          ${DOCKER_USERNAME}/chat2api-rust"
          fi
          echo "images<<EOF" >> $GITHUB_OUTPUT
          echo "$IMAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        if: env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.set_images.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.get_version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: rust_docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: contains(github.event.head_commit.message, 'release')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
